name: Verify

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install
        run: npm ci

      - name: Check
        run: npm run check

      - name: Verify Contracts
        run: npm run verify:contracts

      - name: Verify Core
        run: npm run verify:core
